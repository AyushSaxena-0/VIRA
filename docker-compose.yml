version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/storage:/app/storage

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vira
      POSTGRES_PASSWORD: vira
      POSTGRES_DB: vira
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
